# Production-hardened Nginx configuration
# Security properties enforced:
#   - TLS 1.3 only (TLS 1.2 allowed for compatibility but 1.0/1.1 dropped)
#   - HSTS with 1-year max-age + includeSubDomains + preload
#   - Strict Content-Security-Policy (no unsafe-inline for scripts)
#   - X-Frame-Options: DENY
#   - Permissions-Policy to disable dangerous browser APIs
#   - Rate limiting on /api/ endpoints
#   - HTTP → HTTPS redirect
#   - Server token hidden
#   - Strict timeout settings

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream dashboard_backend {
    server dashboard-backend:8000;
    keepalive 32;
}

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
# 10 req/s per IP for API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 5 req/min for auth endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # HSTS preload even on HTTP responses
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    return 301 https://$host$request_uri;
}

# ── HTTPS Server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS Configuration ────────────────────────────────────────────────────
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_trusted_certificate /certs/ca.crt;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # TLS 1.3 cipher suites (non-configurable by design in OpenSSL 1.1.1+)
    # TLS 1.2 fallback — only strong ciphers, no RC4/3DES/export
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;      # Disable for forward secrecy

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    # HSTS — 1 year, all subdomains, preload eligible
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # No clickjacking
    add_header X-Frame-Options "DENY" always;

    # No MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer leak prevention
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy: disable features not needed by this SPA
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), payment=(), interest-cohort=()" always;

    # Content-Security-Policy
    # - Scripts: only self + specific CDN nonce-based (dashboard uses hashed inline scripts from Vite build)
    # - No unsafe-inline for scripts (React bundles are external files)
    # - Fonts from Google Fonts
    # - Connect-src allows only same-origin API and the OIDC issuer
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://${OIDC_ISSUER_HOST}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Cross-Origin policies
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # Hide server version
    server_tokens off;

    # ── Root & SPA ────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # ── Static Assets Caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── API Proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        # Rate limiting — burst 20 requests, no delay
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Tight timeouts for API calls
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;

        # Security: strip upstream headers that reveal internals
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Don't buffer large responses
        proxy_buffering off;
    }

    # ── Auth endpoints — tighter rate limiting ────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Deny access to hidden files ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Health Check (no auth required) ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
